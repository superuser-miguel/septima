<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b6ee1"/>
      <stop offset="1" stop-color="#3b3a9e"/>
    </linearGradient>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6e8f5"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="url(#bg)"/>

  <!-- Archive box -->
  <g transform="translate(28 30)">
    <!-- body -->
    <rect x="0" y="18" width="72" height="52" rx="7" fill="url(#lid)"/>
    <!-- lid -->
    <rect x="-4" y="6" width="80" height="20" rx="7" fill="#ffffff"/>
    <!-- seam -->
    <rect x="32" y="6" width="8" height="64" fill="#c7cbe8"/>
    <!-- zipper pull -->
    <rect x="30" y="40" width="12" height="14" rx="3" fill="#3b3a9e"/>
  </g>
</svg>
